<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>浮动的小练习</title>
    <style>
        .outer {
            width: 300px;
            background-color: white;
            border: 1px solid #000;
        }

        .box {
            width: 100px;
            height: 100px;
            border: 1px solid #000;
            margin: 10px;
            float: left;
            background-color: skyblue;
        }

        .box1 {
            height: 120px;
        }
    </style>
</head>

<body>
    <div class="outer">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
    </div>
</body>

</html>
