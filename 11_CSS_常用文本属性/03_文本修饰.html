<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年04月23日 11:59:22:87 -->
	<meta charset="UTF-8">
	<title>文本修饰</title>
	<style>
		div {
			font-size: 30px;
		}
		
		.atguigu1 {
			/* 上划的绿色虚线 */
			text-decoration: overline dotted green;
		}
		
		.atguigu2 {
			/* 下划的红色波浪线 */
			text-decoration: underline wavy red;
		}
		
		.atguigu3 {
			/* 删除线 */
			text-decoration: line-through;
		}
		
		.atguigu4, ins, del {
			/* 没有线 */
			text-decoration: none;
		}
	</style>
</head>
<body>
	<div class="atguigu1">尚硅谷1</div>
	<div class="atguigu2">尚硅谷2</div>
	<div class="atguigu3">尚硅谷3</div>
	<a class="atguigu4" href="https://www.baidu.com">尚硅谷34</a>
	<ins>测试1</ins>
	<del>测试2</del>
</body>
</html>
