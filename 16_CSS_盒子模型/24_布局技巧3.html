<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>布局技巧3</title>
    <style>
        #outer {
            width: 400px;
            height: 400px;
            overflow: hidden;
            background-color: gray;
            text-align: center;
            line-height: 400px;
            font-size: 0;
        }

        #inner {
            font-size: 40px;
            background-color: orange;
            vertical-align: middle;
        }

        img {
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div id="outer">
        <span id="inner">出来玩啊？</span><img src="../images/悟空.jpg" alt="">
    </div>
</body>

</html>
