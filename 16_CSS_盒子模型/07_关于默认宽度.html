<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>关于默认宽度</title>
    <style>
        div {
            height: 200px;
            margin: 50px;
            border: 5px;
            padding: 50px;
            background-color: gray;
        }
    </style>
</head>

<body>
    <div>你好啊</div>
    <!--
        默认宽度就是不设置width属性时，元素所呈现出的宽度
        总宽度 = 父的content - 自身的左右margin
        内容区的宽度 = 父的content - 自身的左右margin -自身的左右border - 自身的左右padding
    -->
</body>

</html>
