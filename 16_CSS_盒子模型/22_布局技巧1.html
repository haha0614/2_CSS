<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>布局技巧1</title>
    <style>
        #outer {
            width: 400px;
            height: 400px;
            overflow: hidden;
            background-color: gray;
            position: inherit;
        }

        #inner {
            width: 200px;
            height: 100px;
            margin: auto;
            margin-top: 150px;
            text-align: center;
            line-height: 100px;
            background-color: orange;
        }
    </style>
</head>

<body>
    <div id="outer">
        <div id="inner">inner</div>
    </div>
</body>

</html>
