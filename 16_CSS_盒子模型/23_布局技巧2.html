<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>布局技巧2</title>
    <style>
        #outer {
            width: 400px;
            height: 400px;
            overflow: hidden;
            background-color: gray;
            text-align: center;
            line-height: 400px;
        }

        #inner {
            background-color: orange;
        }
    </style>
</head>

<body>
    <div id="outer">
        <span id="inner">出来玩啊？</span>
    </div>
</body>

</html>
