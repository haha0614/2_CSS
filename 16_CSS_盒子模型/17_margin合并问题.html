<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>margin合并问题</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
        }

        .box1 {
            background-color: deepskyblue;
            margin-bottom: 50px;
        }

        .box2 {
            background-color: orange;
            margin-top: 50px;
        }

        .one {
            margin-right: 50px;
        }

        .two {
            margin-left: 50px;
        }
    </style>
</head>

<body>
    <div class="box box1">1</div>
    <div class="box box2">2</div>
    <hr>
    <img class="one" src="../images/悟空.jpg" alt=""><img class="two" src="../images/悟空.jpg" alt="">
</body>

</html>
