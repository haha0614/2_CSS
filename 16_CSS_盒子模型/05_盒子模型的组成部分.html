<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>盒子模型的组成部分</title>
    <style>
        div {
            /* 内容区（元素中的文本或后代元素都是它的内容）的宽 */
            width: 400px;
            /* 内容区（元素中的文本或后代元素都是它的内容）的高 */
            height: 400px;
            /* 内边距（紧贴内容的补白区域） 设置的背景色对内边距也有效 */
            padding: 20px;
            /* 边框 设置的背景色对边框也有效 */
            border: 10px solid black;
            /* 外边距 盒子与外界的距离 */
            margin: 50px;
            /* 盒子的大小 = content + 左右padding + 左右border */
            /* 注意：外边距margin不会影响盒子的大小，但会影响盒子的位置 */


            font-size: 40px;
            background-color: gray;
        }
    </style>
</head>

<body>
    <div>你好啊</div>
</body>

</html>
