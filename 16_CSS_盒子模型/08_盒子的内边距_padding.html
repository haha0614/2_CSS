<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>盒子的内边距_padding</title>
    <style>
        #d1 {
            width: 100px;
            height: 100px;

            /* 左侧内边距 */
            /* padding-left: 20px; */

            /* 上内边距 */
            /* padding-top: 30px; */

            /* 右内边距 */
            /* padding-right: 40px; */

            /* 下内边距 */
            /* padding-bottom: 50px; */

            /* 复合属性，写一个值，含义：四个方向的内边距是一样的 */
            /* padding: 20px; */

            /* 复合属性，写两个值，含义：上下20 左右30 */
            /* padding: 20px 30px; */

            /* 复合属性，写三个值，含义：上20 左右30 下40 */
            /* padding: 20px 30px 40px; */

            /* 复合属性，写四个值，含义：上20 右30 下40 左50 */
            padding: 20px 30px 40px 50px;

            font-size: 40px;
            background-color: skyblue;
        }

        span {
            font-size: 40px;

            padding-left: 20px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;


            background-color: orange;
        }

        img {
            width: 200px;
            height: 200px;

            padding: 50px;
        }
    </style>
</head>

<body>
    <div id="d1">你好啊</div>
    <hr>
    <span>我很好</span>
    <div>好好学习</div>
    <hr>
    <img src="../images/小姐姐.gif" alt="">
    <div>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur, doloribus. Id blanditiis totam, odit
        voluptates magni corrupti libero. Hic quos nihil quae ipsa ab, quod accusamus quam at facilis dicta!</div>
</body>

</html>
