<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年02月15日 09:57:05:270 -->
	<meta charset="UTF-8">
	<title>兄弟选择器</title>
	<style>
		/* 选中div后紧紧相邻的兄弟p元素----相邻兄弟选择器 */
		/* div+p {
			color: red;
		} */
		
		/* 选中div后所有的兄弟p元素----通用兄弟选择器 */
		div~p {
			color: red;
		}
		li+li {
			color: orange;
		}
	</style>
</head>
<body>
	<div>尚硅谷</div>
	<p>前端</p>
	<p>Java</p>
	<p>大数据</p>
	<p>UI</p>
	<ul>
		<li>主页</li>
		<li>秒杀</li>
		<li>订单</li>
		<li>我的</li>
	</ul>
</body>
</html>
