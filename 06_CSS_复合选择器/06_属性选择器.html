<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年02月15日 10:09:35:831 -->
	<meta charset="UTF-8">
	<title>属性选择器</title>
	<style>
		/* 第一种写法：选中具有title属性的元素 */
		/* [title] {
			color: red;
		} */
		
		/* 第二种写法：选中具有title属性，且属性值为atguigu1的元素 */
		/* [title="atguigu1"] {
			color: red;
		} */
		
		/* !* 第三种写法：选中具有title属性，且属性值以字母a开头的元素 *!
		[title^="a"] {
			color: red;
		} */
		
		/* 第四种写法：选中具有title属性，且属性值以字母u结尾的元素 */
		/* [title$="u"] {
			color: red;
		} */
		
		/* 第五种写法：选中具有title属性，且属性值含有字母u的元素 */
		[title*="u"] {
			color: red;
		}
	</style>
</head>
<body>
	<div title="atguigu1">尚硅谷1</div>
	<div title="atguigv2">尚硅谷2</div>
	<div title="guigu3">尚硅谷3</div>
	<div title="guigu4">尚硅谷4</div>
</body>
</html>
