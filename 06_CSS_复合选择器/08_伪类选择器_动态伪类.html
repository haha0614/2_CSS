<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年02月15日 10:39:47:512 -->
	<meta charset="UTF-8">
	<title>伪类选择器_动态伪类</title>
	<style>
		
		/* 什么是伪类？ --很像类，但不是类（class），是元素特殊状态的一种描述 */
		/* 选中的是没有访问过的a元素 */
		a:link {
			color: orange;
		}
		/* 选中的是访问过的a元素 */
		a:visited {
			color: gray;
		}
		/* 选中的是鼠标悬浮状态的a元素 */
		a:hover {
			color: skyblue;
		}
		/* 选中的是激活状态（鼠标按下）的a元素 */
		a:active {
			color: green;
		}
		/* 选中的是鼠标悬浮状态的span元素 */
		span:hover {
			color: red;
		}
		/* 选中的是激活状态（鼠标按下）的span元素 */
		span:active {
			color: green;
		}
		
		input:focus,select:focus {
			background-color: green;
			color: orange;
		}
	</style>
</head>
<body>
	<a href="https://www.baidu.com">去百度</a>
	<a href="https://www.jd.com">去京东</a>
	
	<span>尚硅谷</span>
	<br>
	<input type="text">
	<br>
	<input type="text">
	<br>
	<input type="text">
	<br>
	<select>
		<option value="bwjk">北京</option>
		<option value="uhhd">上海</option>
	</select>
</body>
</html>
