<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年02月15日 12:15:08:11 -->
	<meta charset="UTF-8">
	<title>伪类选择器_UI伪类</title>
	<style>
		/* 选中的是勾选的复选框或者单选按钮 */
		input:checked {
			background-color: green;
			width: 100px;
			height: 100px;
			color: red;
		}
		/* 选中的是被禁用的input元素 */
		input:disabled {
			background-color: gray;
			border-color: red;
		}
		/* 选中的是被可用的input元素 */
		input {
			background-color: green;
			border-color: red;
		}
	</style>
</head>
<body>
	<input type="checkbox">
	<input type="radio" name="gender">
	<input type="radio" name="gender">
	<input type="text">
	<input type="text" disabled>
</body>
</html>
