<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年02月15日 12:39:50:39 -->
	<meta charset="UTF-8">
	<title>伪元素选择器</title>
	<style>
		/* 什么是伪元素？---很像元素，但不是元素（element），是元素中的一些特殊位置 */
		/* 选中的是div中的第一个字符 */
		div::first-letter {
			color: red;
			font-size: 48px;
		}
		/* 选中的是div中的第一行字符 */
		div::first-line {
			background-color: yellow;
		}
		
		/* 选中的是div中的被鼠标选择的字符 */
		div::selection {
			background-color: skyblue;
			color: red;
		}
		/* 选中的是input元素中的提示的文字 */
		input::placeholder {
			color: skyblue;
		}
		/* 选中的是p元素最开始的位置，随后创建一个子元素 */
		p::before {
			content: "¥";
		}
		/* 选中的是p元素最后的位置，随后创建一个子元素 */
		p::after {
			content: ".00";
		}
	</style>
</head>
<body>
	<div>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium aliquid deleniti doloribus enim et eum fuga, fugit, id ipsam itaque laborum molestias non numquam quia quidem reprehenderit vel voluptates voluptatibus.</div>
	<br>
	<input type="text" placeholder="请输入您的用户名">
	<p>199</p>
	<p>299</p>
	<p>399</p>
	<p>499</p>
</body>
</html>
