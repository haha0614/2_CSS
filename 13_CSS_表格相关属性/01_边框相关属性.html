<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年04月25日 19:48:30:344 -->
	<meta charset="UTF-8">
	<title>边框相关属性</title>
	<style>
		table {
			/* border-width: 2px; */
			/* border-color: green; */
			/* border-style: solid; */
			border: 2px solid black;
		}
		td,th {
			border: 2px solid orange;
		}
		h2 {
			border: 2px solid red;
		}
		span {
			border: 2px solid blue;
		}
	</style>
</head>
<body>
	<h2>边框相关属性，不仅仅表格能用，其他元素也能用</h2>
	<span>行内元素也能用</span>
 <table>
	 <caption>人员信息</caption>
	 <thead>
		 <tr>
			 <th>序号</th>
			 <th>姓名</th>
			 <th>年龄</th>
			 <th>性别</th>
			 <th>政治面貌</th>
		 </tr>
	 </thead>
	 <tbody>
		<tr>
			<td>1</td>
			<td>张三</td>
			<td>23</td>
			<td>男</td>
			<td>党员</td>
		</tr>
		 <tr>
			 <td>2</td>
			 <td>李四</td>
			 <td>24</td>
			 <td>女</td>
			 <td>群众</td>
		 </tr>
	 </tbody>
 </table>
</body>
</html>
