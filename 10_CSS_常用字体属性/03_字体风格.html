<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年04月22日 21:28:34:120 -->
	<meta charset="UTF-8">
	<title>字体风格</title>
	<style>
		.atguigu1 {
			font-size: 100px;
			font-style: normal;
		}
		
		.atguigu2 {
			font-size: 100px;
			font-style: italic;
			/* 	italic: 主动寻找字体设计的斜体风格，如果没有则强制斜体 */
		}
		
		.atguigu3 {
			font-size: 100px;
			font-style: oblique;
			/* 	oblique：强制斜体 */
		}
		
		em {
			font-size: 100px;
			font-style: normal;
		}
	</style>
</head>
<body>
	<div class="atguigu1">尚硅谷1</div>
	<div class="atguigu2">尚硅谷2</div>
	<div class="atguigu3">尚硅谷3</div>
	<em>尚硅谷4</em>
</body>
</html>
