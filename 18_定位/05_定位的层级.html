<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>定位的层级</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            height: 2000px;
        }

        .outer {
            width: 500px;
            height: 400px;
            background-color: skyblue;
            border: 1px solid #000;
            padding: 10px;
            position: relative;
            z-index: 2;
        }

        .box {
            width: 200px;
            height: 200px;
            position: relative;
        }

        .box1 {
            background-color: gray;
        }

        .box2 {
            background-color: orange;
            position: relative;
            top: -150px;
            left: 50px;
        }

        .box3 {
            background-color: green;
            position: absolute;
            top: 110px;
            left: 110px;
        }

        .box4 {
            background-color: red;
            position: fixed;
            top: 160px;
            left: 160px;
            z-index: 50;
        }

        .box5 {
            background-color: purple;
            position: fixed;
            top: 210px;
            left: 210px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="outer">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>
    <div class="box box5">5</div>
</body>

</html>
