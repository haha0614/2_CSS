<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <title>绝对定位</title>

    <style>
        .outer {
            width: 500px;
            background-color: skyblue;
            border: 1px solid #000;
            padding: 10px;
            position: relative;
        }

        .outer:hover .box3 {
            position: absolute;
        }

        .box {
            width: 200px;
            height: 200px;
            font-size: 20px;
        }

        .box1 {
            background-color: #888;
        }

        .box2 {
            background-color: orange;
            position: absolute;
            top: 210px;
            left: 10px;
            /* right: 0; */
            /* bottom: 0; */
            /*
                对于绝对定位的元素来说，他所参考的点是他的包含块
                    1.对于没有脱离文档流的元素来说，包含块是他的父元素
                    2.脱离文档流的元素，第一个开启定位的祖先元素，就是他的包含块
            */
        }

        .box3 {
            background-color: green;
        }
    </style>
</head>

<body>
    <div class="outer">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
    </div>
</body>

</html>
