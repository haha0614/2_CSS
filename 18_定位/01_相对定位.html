<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>相对定位</title>

    <style>
        .outer {
            width: 500px;
            background-color: skyblue;
            border: 1px solid #000;
            padding: 10px;
        }

        .box {
            width: 200px;
            height: 200px;
            font-size: 20px;
        }

        .box1 {
            background-color: #888;
        }

        .box2 {
            background-color: orange;
            /* 相对定位 */
            position: relative;
            /* left: 440px; */
            /* right: 200px; */
            /* 左右不能同时用，如果同时用，左生效，右失效，和前后顺序无关 */
            /* 上下不能同时用，如果同时用，上生效，下失效，和前后顺序无关 */

            top: 50px;
        }

        .box3 {
            background-color: green;
            position: relative;
            top: -50px;
            /* 开启定位的元素，层级比普通元素更高 */
            /* 谁后开启定位，谁的盖在上面 */
        }
    </style>
</head>

<body>
    <div class="outer">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
    </div>
</body>

</html>
