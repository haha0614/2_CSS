<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 创建时间：2025年04月21日 20:41:28:481 -->
	<meta charset="UTF-8">
	<title>颜色_第四种表示_HSL或HSLA</title>
	<style>
		.atguigu1 {
			/* color: hsl(色相，饱和度，亮度/明度) */
			color: hsl(0deg, 100%, 50%);
		}.atguigu2 {
			color: rgb(255, 0, 0);
		}
	</style>
</head>
<body>
	<h2 class="atguigu1">尚硅谷1</h2>
	<h2 class="atguigu2">尚硅谷2</h2>
</body>
</html>
