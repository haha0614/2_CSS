<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<!-- 创建时间：2025年04月25日 21:40:42:255 -->
	<meta charset="UTF-8">
	<title>背景相关属性</title>
	<style>
		div {
			width: 400px;
			height: 400px;
			border: 5px solid black;
			font-size: 40px;
			/* 设置背景颜色（默认值：transparent） */
			/* background-color: skyblue; */
			/* 设置背景图片 */
			/* background-image: url("../images/bg.gif"); */
			/* 设置背景图片的重复方式 */
			/* background-repeat: no-repeat; */
			/* 控制背景图片的位置--第一种写法：关键词 */
			/* background-position: center;  */
			/* 控制背景图片的位置--第一种写法：具体的像素值 */
			/* background-position: 20px 20px; */
			/* 复合属性 */
			background: rgb(135, 207, 235) url("../images/bg.gif") no-repeat 20px 20px;
		}
	</style>
</head>

<body>
	<div>你好呀！</div>
</body>

</html>
